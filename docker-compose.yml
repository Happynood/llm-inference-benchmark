services:
  llm-bench-cuda:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    image: llm-bench-cuda
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./configs:/app/configs
      - ./results:/app/results
      - ${HOME}/models:/models:ro
    # Example: run a llama.cpp benchmark with full GPU offload
    # command: ["--config", "/app/configs/example.yaml", "--output", "/app/results/bench.csv"]
