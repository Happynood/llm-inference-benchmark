services:
  bench-cpu:
    build:
      context: .
      target: cpu
    image: llm-bench:cpu
    volumes:
      - ./configs:/app/configs
      - ./results:/app/results
      - ${HOME}/models:/models:ro
    # Example: llm-bench run --config /app/configs/llama-cpp-cpu.yaml --output /app/results/bench.csv

  bench-gpu:
    build:
      context: .
      target: gpu
    image: llm-bench:gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./configs:/app/configs
      - ./results:/app/results
      - ${HOME}/models:/models:ro
    # Example: llm-bench run --config /app/configs/llama-cpp-gpu.yaml --output /app/results/bench.csv
