services:
  bench-cpu:
    build:
      context: .
      target: cpu
    image: llm-bench:cpu
    volumes:
      - ./configs:/app/configs
      - ./results:/app/results
      - ${HOME}/models:/models:ro
    # Example: llm-bench run --config /app/configs/llama-cpp-cpu.yaml --output /app/results/bench.csv

  bench-gpu:
    build:
      context: .
      target: gpu
    image: llm-bench:gpu
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - ./configs:/app/configs
      - ./results:/app/results
      - ${HOME}/models:/models:ro
    # Example: docker compose run --rm bench-gpu --config /app/configs/llama-cpp-gpu.yaml --output /app/results/bench-gpu.csv

  webui:
    build:
      context: .
      target: webui
    image: llm-bench:webui
    ports:
      - "8080:8080"
    volumes:
      - llm-bench-data:/root/.llm-bench
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - ${HOME}/models:/models:ro
    # Open http://localhost:8080 after: docker compose up webui

  webui-gpu:
    build:
      context: .
      target: webui-gpu
    image: llm-bench:webui-gpu
    ports:
      - "8080:8080"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - llm-bench-data:/root/.llm-bench
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface
      - ${HOME}/models:/models:ro
    # Open http://localhost:8080 after: docker compose up webui-gpu

volumes:
  llm-bench-data:
