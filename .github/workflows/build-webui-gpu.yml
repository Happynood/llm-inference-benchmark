name: Build Web UI GPU image

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version tag to label the image (e.g. v1.8.1)
        required: true
        default: v1.8.1

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          sudo apt-get clean

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image name
        id: meta
        env:
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          echo "image=ghcr.io/$(echo "${GH_REPOSITORY}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push Web UI GPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: webui-gpu
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:webui-gpu-${{ inputs.version }}
            ${{ steps.meta.outputs.image }}:webui-gpu-latest
          cache-from: |
            type=gha,scope=gpu
            type=gha,scope=webui-gpu
          cache-to: type=gha,mode=max,scope=webui-gpu
