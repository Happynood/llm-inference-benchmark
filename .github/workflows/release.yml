name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/share/swift /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          sudo docker image prune -af
          sudo apt-get clean

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version tag and image name
        id: meta
        env:
          GH_REPOSITORY: ${{ github.repository }}
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$(echo "${GH_REPOSITORY}" | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push CPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: cpu
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:cpu-${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:cpu-latest
          cache-from: type=gha,scope=cpu
          cache-to: type=gha,mode=max,scope=cpu

      - name: Build and push GPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: gpu
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:gpu-${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:gpu-latest
          cache-from: type=gha,scope=gpu
          cache-to: type=gha,mode=max,scope=gpu

      - name: Build and push Web UI image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: webui
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:webui-${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:webui-latest
          cache-from: type=gha,scope=webui
          cache-to: type=gha,mode=max,scope=webui

      - name: Build and push Web UI GPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: webui-gpu
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:webui-gpu-${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:webui-gpu-latest
          cache-from: type=gha,scope=webui-gpu
          cache-to: type=gha,mode=max,scope=webui-gpu
