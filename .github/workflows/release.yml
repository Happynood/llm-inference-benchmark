name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version tag and image name
        id: meta
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push CPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: cpu
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:cpu-${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:cpu-latest
          cache-from: type=gha,scope=cpu
          cache-to: type=gha,mode=max,scope=cpu

      - name: Build and push GPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: gpu
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:gpu-${{ steps.meta.outputs.version }}
            ${{ steps.meta.outputs.image }}:gpu-latest
          cache-from: type=gha,scope=gpu
          cache-to: type=gha,mode=max,scope=gpu
