# llama.cpp — Q4_K_M, best GPU offload config (RTX 3050 4 GB)
#
# All 28 layers on GPU. Confirmed to fit at 2361 MiB peak VRAM (57.6% of 4096 MiB).
# Part of the quantization comparison:
#   uv run llm-bench matrix --config configs/llama-cpp-quant-compare.yaml
#
# Set model: to your local GGUF path:
#   huggingface-cli download bartowski/Llama-3.2-3B-Instruct-GGUF \
#     Llama-3.2-3B-Instruct-Q4_K_M.gguf --local-dir ~/models/

backend: llama-cpp
model: /path/to/model.gguf
requests: 10
warmup_requests: 2
prompts_file: data/prompts/smoke.txt

llama_cpp:
  n_ctx: 512
  n_gpu_layers: 99      # all 28 layers on GPU; peak VRAM ~2361 MiB on RTX 3050
  max_tokens: 50
  temperature: 0.0      # greedy/deterministic
  n_threads: null
  verbose: false
