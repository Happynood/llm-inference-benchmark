# llama.cpp — n_gpu_layers=0 (CPU only, CUDA-compiled wheel)
#
# Part of the n_gpu_layers sweep. Run via:
#   uv run llm-bench matrix --config configs/llama-cpp-vram-sweep.yaml
#
# NOTE: The CUDA-compiled wheel initialises the CUDA backend unconditionally.
# Even with n_gpu_layers=0, expect ~655 MiB VRAM for CUDA context + scratch buffers.

backend: llama-cpp
model: /path/to/model.gguf
requests: 10
warmup_requests: 2
prompts_file: data/prompts/smoke.txt

llama_cpp:
  n_ctx: 512
  n_gpu_layers: 0
  max_tokens: 50
  temperature: 0.0
  n_threads: null
  verbose: false
