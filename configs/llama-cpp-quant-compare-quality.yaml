# Quantization comparison matrix with task-quality evaluation — Q4_K_M vs Q8_0
# Llama 3.2 3B Instruct on RTX 3050 4 GB (llama.cpp), v0.16
#
# Extends llama-cpp-quant-compare.yaml to add quality_file evaluation.
# Both quantizations run at n_gpu_layers=99 (all 28 layers on GPU).
# Q4_K_M peak VRAM: ~2361 MiB. Q8_0 peak VRAM: ~3697 MiB.
#
# Set model: paths in each config before running:
#   configs/llama-cpp-q4km-quality.yaml → Q4_K_M GGUF path
#   configs/llama-cpp-q8-quality.yaml   → Q8_0 GGUF path
#
# Run (CUDA 12/13 workaround for pre-built cu124 wheel):
#   CUDA_LIBS=$(find .venv/lib/python3.12/site-packages/nvidia -name "*.so*" \
#     | xargs -I{} dirname {} | sort -u | tr '\n' ':')
#   LD_LIBRARY_PATH="${CUDA_LIBS}${LD_LIBRARY_PATH}" \
#     uv run llm-bench matrix --config configs/llama-cpp-quant-compare-quality.yaml
#
# Compare results with task quality:
#   uv run llm-bench compare results/quant-q4km-quality.csv results/quant-q8-quality.csv
#   uv run llm-bench pareto  results/quant-q4km-quality.csv results/quant-q8-quality.csv
#   uv run llm-bench recommend results/quant-q4km-quality.csv results/quant-q8-quality.csv \
#     --max-vram-mb 4096 --max-p95-ms 1000 --min-sanity 1.0 --min-quality 1.0

results_dir: results

runs:
  - name: quant-q4km-quality
    config: configs/llama-cpp-q4km-quality.yaml

  - name: quant-q8-quality
    config: configs/llama-cpp-q8-quality.yaml
