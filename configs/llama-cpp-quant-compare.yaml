# Quantization comparison matrix — Q4_K_M vs Q8_0
# Llama 3.2 3B Instruct on RTX 3050 4 GB (llama.cpp)
#
# Both quantizations run at n_gpu_layers=99 (all 28 layers on GPU).
# Q4_K_M peak VRAM: ~2361 MiB. Q8_0 peak VRAM: ~3697 MiB.
#
# Set model: paths in each config before running:
#   configs/llama-cpp-q4km-best.yaml → Q4_K_M GGUF path
#   configs/llama-cpp-q8-best.yaml   → Q8_0 GGUF path
#
# Run (CUDA 12/13 workaround for pre-built cu124 wheel):
#   CUDA_LIBS=$(find .venv/lib/python3.12/site-packages/nvidia -name "*.so*" \
#     | xargs -I{} dirname {} | sort -u | tr '\n' ':')
#   LD_LIBRARY_PATH="${CUDA_LIBS}${LD_LIBRARY_PATH}" \
#     uv run llm-bench matrix --config configs/llama-cpp-quant-compare.yaml
#
# Compare results:
#   uv run llm-bench compare results/quant-q4km.csv results/quant-q8.csv

results_dir: results

runs:
  - name: quant-q4km
    config: configs/llama-cpp-q4km-best.yaml

  - name: quant-q8
    config: configs/llama-cpp-q8-best.yaml
