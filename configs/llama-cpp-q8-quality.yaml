# llama.cpp — Q8_0, best GPU offload config with task-quality evaluation (RTX 3050 4 GB)
#
# Extends llama-cpp-q8-best.yaml with quality_file for v0.16 rubric evaluation.
# All 28 layers on GPU. Probed to fit at ~3697 MiB peak VRAM (90.2% of 4096 MiB).
#
# Part of the v0.16 task-quality comparison:
#   uv run llm-bench matrix --config configs/llama-cpp-quant-compare-quality.yaml
#
# Set model: to your local GGUF path before running:
#   huggingface-cli download bartowski/Llama-3.2-3B-Instruct-GGUF \
#     Llama-3.2-3B-Instruct-Q8_0.gguf --local-dir ~/models/

backend: llama-cpp
model: /path/to/Llama-3.2-3B-Instruct-Q8_0.gguf
requests: 10
warmup_requests: 2
prompts_file: data/prompts/smoke.txt
quality_file: configs/quality/smoke-rubric.yaml

llama_cpp:
  n_ctx: 512
  n_gpu_layers: 99      # all 28 layers on GPU; peak VRAM ~3697 MiB on RTX 3050
  max_tokens: 50
  temperature: 0.0      # greedy/deterministic
  n_threads: null
  verbose: false
